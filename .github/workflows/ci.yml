name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  build:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        workdir:
          - .
          - frontend-fan-pwa
          - frontend-volunteer-app
          - ops-dashboard
          - agents/concierge-agent
    defaults:
      run:
        working-directory: ${{ matrix.workdir }}
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
      - name: Install dependencies
        run: npm install
      - name: Lint
        run: npm run lint || true
      - name: Test
        run: npm test
